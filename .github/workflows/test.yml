name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: PYTHONDONTWRITEBYTECODE=1 python -m unittest discover -s tests
      - run: PYTHONDONTWRITEBYTECODE=1 python scripts/validate_references.py
      - run: PYTHONDONTWRITEBYTECODE=1 python scripts/run_evaluations.py
      - run: PYTHONDONTWRITEBYTECODE=1 python scripts/evaluate_model_outputs.py
      - run: python -m compileall -q src scripts
